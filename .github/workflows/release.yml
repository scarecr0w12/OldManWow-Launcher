name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build release launcher
        shell: pwsh
        run: .\scripts\Build-Launcher.ps1 -ProjectPath 'Wow-Launcher\Wow-Launcher.csproj' -Configuration 'Release' -OutputDirectory 'artifacts' -ReleaseVersion '${{ env.RELEASE_TAG }}'

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wow-Launcher-${{ env.RELEASE_TAG }}
          path: artifacts/Wow-Launcher.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Launcher ${{ env.RELEASE_TAG }}
          body: Automated launcher release for ${{ env.RELEASE_TAG }}.
          files: artifacts/Wow-Launcher.exe

      - name: Sync assembly version to main
        shell: pwsh
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          .\scripts\Set-AssemblyVersion.ps1 -AssemblyInfoPath 'Wow-Launcher\Properties\AssemblyInfo.cs' -ReleaseVersion '${{ env.RELEASE_TAG }}'

          git diff --quiet --exit-code -- 'Wow-Launcher/Properties/AssemblyInfo.cs'
          if ($LASTEXITCODE -eq 0) {
              Write-Host 'Assembly version is already synced on main.'
              exit 0
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'Wow-Launcher/Properties/AssemblyInfo.cs'
          git commit -m 'Sync assembly version to ${{ env.RELEASE_TAG }} [skip release]'
          git push origin HEAD:main
