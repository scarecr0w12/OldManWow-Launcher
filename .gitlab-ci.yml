stages:
  - verify
  - tag
  - build
  - release

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

default:
  tags:
    - windows

variables:
  PROJECT_PATH: "Wow-Launcher\\Wow-Launcher.csproj"
  BUILD_CONFIGURATION: "Release"
  BUILD_OUTPUT_DIRECTORY: "artifacts"
  RELEASE_OUTPUT_DIRECTORY: "release"

verify_launcher:
  stage: verify
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Build-Launcher.ps1 -ProjectPath "$env:PROJECT_PATH" -Configuration "$env:BUILD_CONFIGURATION" -OutputDirectory "$env:BUILD_OUTPUT_DIRECTORY"

create_release_tag:
  stage: tag
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE !~ /(?i)\[skip release\]/'
      when: on_success
    - when: never
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\New-GitLabTag.ps1

build_launcher_release:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Build-Launcher.ps1 -ProjectPath "$env:PROJECT_PATH" -Configuration "$env:BUILD_CONFIGURATION" -OutputDirectory "$env:BUILD_OUTPUT_DIRECTORY" -ReleaseVersion "$env:CI_COMMIT_TAG"
  artifacts:
    paths:
      - artifacts/Wow-Launcher.exe
    expire_in: never

release_launcher:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - job: build_launcher_release
      artifacts: true
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path $env:RELEASE_OUTPUT_DIRECTORY | Out-Null; Copy-Item artifacts\Wow-Launcher.exe release\Wow-Launcher.exe -Force"
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Publish-GitLabRelease.ps1 -AssetPath "release\Wow-Launcher.exe" -AssetName "Wow-Launcher.exe"
  artifacts:
    paths:
      - release/Wow-Launcher.exe
    expire_in: never
