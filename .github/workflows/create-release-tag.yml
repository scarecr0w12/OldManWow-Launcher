name: Create Release Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: create-release-tag-main
  cancel-in-progress: false

jobs:
  tag:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create next release tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\scripts\New-GitHubTag.ps1 -Repository '${{ github.repository }}' -CommitSha '${{ github.sha }}' -Token $env:GITHUB_TOKEN
