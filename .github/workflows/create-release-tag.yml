name: Create Release Tag

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

concurrency:
  group: create-release-tag-main
  cancel-in-progress: false

jobs:
  tag:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create next release tag
        id: create_tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\scripts\New-GitHubTag.ps1 -Repository '${{ github.repository }}' -CommitSha '${{ github.sha }}' -Token $env:GITHUB_TOKEN

      - name: Trigger release workflow
        if: ${{ steps.create_tag.outputs.release_tag != '' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
              Accept = 'application/vnd.github+json'
              Authorization = "Bearer $env:GITHUB_TOKEN"
              'User-Agent' = 'Wow-Launcher-GitHub-Actions'
              'X-GitHub-Api-Version' = '2022-11-28'
          }

          $payload = @{
              ref = 'main'
              inputs = @{
                  release_tag = '${{ steps.create_tag.outputs.release_tag }}'
              }
          } | ConvertTo-Json -Depth 4

          Invoke-RestMethod -Method Post -Uri 'https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches' -Headers $headers -Body $payload -ContentType 'application/json' | Out-Null
