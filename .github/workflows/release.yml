name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build release launcher
        shell: pwsh
        run: .\scripts\Build-Launcher.ps1 -ProjectPath 'Wow-Launcher\Wow-Launcher.csproj' -Configuration 'Release' -OutputDirectory 'artifacts' -ReleaseVersion '${{ github.ref_name }}'

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wow-Launcher-${{ github.ref_name }}
          path: artifacts/Wow-Launcher.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Launcher ${{ github.ref_name }}
          body: Automated launcher release for ${{ github.ref_name }}.
          files: artifacts/Wow-Launcher.exe
